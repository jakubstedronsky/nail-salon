<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#2c2420" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <title>Nail Studio — POS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { font-family: 'DM Sans', sans-serif; overflow: hidden; }
      input, button, textarea, select { font-family: 'DM Sans', sans-serif; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #d4c4b0; border-radius: 4px; }
      /* Small tablet / large phone */
      @media (max-width: 768px) {
        .pos-wrap { flex-direction: column !important; }
        .pos-left { border-right: none !important; border-bottom: 1px solid #e8dfd4 !important; max-height: 45vh !important; }
        .pos-right { width: 100% !important; }
        .modal-box, .modal-wide { width: 94vw !important; max-width: 480px !important; }
        .booking-grid { grid-template-columns: 1fr !important; }
        .nav-bar button { font-size: 11px !important; padding: 10px 6px !important; }
      }
      /* Phone */
      @media (max-width: 480px) {
        .booking-svc-grid { grid-template-columns: 1fr !important; }
        .modal-box, .modal-wide { width: 96vw !important; max-width: none !important; margin: 8px !important; }
        .nav-bar button { font-size: 9px !important; padding: 8px 3px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
